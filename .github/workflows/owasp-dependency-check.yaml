name: OWASP Dependency Check

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      - name: Resolve app runtime dependencies
        run: |
          ./gradlew :app:dependencies \
            --configuration fdroidReleaseRuntimeClasspath > /dev/null
      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@1e54355a8b4c8abaa8cc7d0b70aa655a3bb15a6c # main
        with:
          project: currencies
          path: '.'
          format: SARIF
          out: reports
          args: >-
            --failOnCVSS 7
            --enableRetired
      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/dependency-check-report.sarif
          category: owasp-dependency-check
      - name: Upload full report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: owasp-report
          path: reports/
          retention-days: 30
