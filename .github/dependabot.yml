version: 2
updates:
  # Gradle (app + helpers modules)
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      androidx:
        patterns:
          - "androidx.*"
      google-material:
        patterns:
          - "com.google.android.material:*"
      kotlin-and-ksp:
        patterns:
          - "org.jetbrains.kotlin*"
          - "com.google.devtools.ksp*"
      moshi:
        patterns:
          - "com.squareup.moshi:*"
      fuel:
        patterns:
          - "com.github.kittinunf.fuel:*"
      test-dependencies:
        dependency-type: "development"
        patterns:
          - "*"
    ignore:
      # Pinned in code: mXparser v5 has an fdroid-incompatible license
      - dependency-name: "org.mariuszgromada.math:MathParser.org-mXparser"
        versions: [">=5.0.0"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      actions:
        patterns:
          - "*"
